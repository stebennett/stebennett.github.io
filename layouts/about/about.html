{{ define "main" }}
  <article>
    <div class="flex items-center gap-6 mb-10">
      <img src="/images/avatar.png" alt="{{ .Site.Params.name }}" class="w-24 h-24 rounded-full ring-2 ring-accent/20 flex-shrink-0">
      <div>
        <h1 class="text-3xl font-bold tracking-tight">{{ .Site.Params.name }}</h1>
        <p class="text-accent font-medium mt-1">{{ .Site.Params.tagline }}</p>
        <div class="flex items-center gap-3 mt-3">

    <div class="prose prose-zinc dark:prose-invert prose-lg font-editorial prose-headings:font-sans prose-headings:tracking-tight prose-a:text-accent prose-a:no-underline hover:prose-a:underline prose-p:leading-relaxed">
      {{ .Content }}
    </div>
  </article>
{{ end }}
