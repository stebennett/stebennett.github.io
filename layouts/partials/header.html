{{/* Emerald accent bar */}}
<div class="h-1 bg-accent"></div>

{{/* Header */}}
<header class="bg-white dark:bg-zinc-900 border-b border-zinc-200 dark:border-zinc-800">
  <div class="max-w-6xl mx-auto px-6 py-5 flex items-center justify-between">
    <a href="/" class="text-xl font-bold tracking-tight text-zinc-900 dark:text-zinc-100 hover:text-accent dark:hover:text-accent transition-colors">
      {{ .Site.Params.name }}
    </a>
    <div class="flex items-center gap-6">
      <nav class="hidden sm:flex items-center gap-6 text-sm font-medium">
        <a href="/posts/" class="text-zinc-500 dark:text-zinc-400 hover:text-accent dark:hover:text-accent transition-colors">Archive</a>
        <a href="/notes/" class="text-zinc-500 dark:text-zinc-400 hover:text-accent dark:hover:text-accent transition-colors">Notes</a>
        <a href="/about/" class="text-zinc-500 dark:text-zinc-400 hover:text-accent dark:hover:text-accent transition-colors">About</a>
        <a href="/index.xml" class="text-zinc-400 dark:text-zinc-500 hover:text-accent dark:hover:text-accent transition-colors" aria-label="RSS Feed">
          <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M12.75 19.5v-.75a7.5 7.5 0 00-7.5-7.5H4.5m0-6.75h.75c7.87 0 14.25 6.38 14.25 14.25v.75M6 18.75a.75.75 0 11-1.5 0 .75.75 0 011.5 0z" /></svg>
        </a>
      </nav>
      <button id="theme-toggle" class="text-zinc-400 dark:text-zinc-500 hover:text-accent dark:hover:text-accent transition-colors rounded-md p-1 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-accent focus-visible:ring-offset-2 focus-visible:ring-offset-white dark:focus-visible:ring-offset-zinc-900" aria-label="Toggle dark mode">
        <svg class="hidden dark:block w-5 h-5" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 3v2.25m6.364.386l-1.591 1.591M21 12h-2.25m-.386 6.364l-1.591-1.591M12 18.75V21m-4.773-4.227l-1.591 1.591M5.25 12H3m4.227-4.773L5.636 5.636M15.75 12a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0z" />
        </svg>
        <svg class="block dark:hidden w-5 h-5" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="M21.752 15.002A9.718 9.718 0 0118 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 003 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 009.002-5.998z" />
        </svg>
      </button>
    </div>
  </div>
</header>
