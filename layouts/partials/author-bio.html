<div class="flex items-start gap-5 p-6 rounded-xl bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800">
  <img src="/images/avatar.png" alt="{{ .Site.Params.name }}" class="w-14 h-14 rounded-full ring-2 ring-accent/20 flex-shrink-0">
  <div>
    <p class="font-semibold text-sm">{{ .Site.Params.name }}</p>
    <p class="text-xs text-accent font-medium mt-0.5">{{ .Site.Params.tagline }}</p>
    <p class="text-sm text-zinc-500 dark:text-zinc-400 mt-2 leading-relaxed">{{ .Site.Params.shortBio }}</p>
    <a href="/about/" class="inline-flex items-center gap-1 mt-3 text-xs font-medium text-accent hover:text-accent-hover transition-colors">
      More about {{ .Site.Params.name }}
      <svg class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M13.5 4.5L21 12m0 0l-7.5 7.5M21 12H3" /></svg>
    </a>
  </div>
</div>
